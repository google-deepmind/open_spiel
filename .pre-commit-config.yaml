repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-symlinks
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: debug-statements
      - id: forbid-new-submodules

  - repo: https://github.com/google/pyink
    rev: 24.10.1
    hooks:
      - id: pyink
        args: [--line-length=80]  # Matches Google style

  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]  # pyink is black-compatible

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: python -m pylint
        language: system
        types: [python]
        args: [
          "-rn",
          "-sn",
          "--rcfile=.pylintrc",
          "--fail-under=0",
          "--fail-on=E,F"
        ]
